<!doctype html>
<title>Mauri870's Linux Emu</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

#terminal {
    width: 100vw;
    height: calc(var(--app-height, 1vh) * 100);
    height: 100dvh;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/v86@0.5.373/build/libv86.min.js"></script>
<script type="module">
"use strict";

import { init, Terminal, FitAddon, UrlRegexProvider } from "https://cdn.jsdelivr.net/npm/ghostty-web@0.4.0/+esm";

await init();

function main()
{
    function setAppHeight() {
        var viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty("--app-height", (viewportHeight * 0.01) + "px");
    }

    setAppHeight();

    var term = new Terminal({
        scrollback: 5000,
        fontSize: 14,
        fontFamily: "monospace",
        theme: {
            background: "#000000",
            foreground: "#ffffff",
        },
        cols: 120,
        rows: 40,
        convertEol: false,
    });

    var fitAddon = new FitAddon();
    term.loadAddon(fitAddon);

    term.open(document.getElementById("terminal"));

    term.registerLinkProvider(new UrlRegexProvider(term));

    fitAddon.fit();
    term.focus();

    function onViewportChange() {
        setAppHeight();
        fitAddon.fit();
    }

    window.addEventListener("resize", onViewportChange);
    window.addEventListener("orientationchange", onViewportChange);
    if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", onViewportChange);
    }

    var emulator = window.emulator = new V86({
        wasm_path: "https://cdn.jsdelivr.net/npm/v86@0.5.373/build/v86.wasm",
        memory_size: 128 * 1024 * 1024,
        vga_memory_size: 8 * 1024 * 1024,
        bios: {
            url: "seabios.bin",
        },
        vga_bios: {
            url: "vgabios.bin",
        },
        bzimage: {
            url: "bzImage",
        },
        initrd: {
            url: "init.cpio.lzma",
        },
        cmdline: "mitigations=off console=ttyS0 init=/init",
        autostart: true,
        disable_keyboard: true,
        disable_mouse: true,
    });

    emulator.add_listener("serial0-output-byte", function(byte)
    {
        term.write(String.fromCharCode(byte));
    });

    term.onData(function(data)
    {
        emulator.serial0_send(data);
    });
}

main();
</script>

<noscript>
    <div style="color: white; background: black; font-family: monospace; padding: 1em; text-align: center;">
        JavaScript is required to run this emulator. Please enable JavaScript in your browser settings.
    </div>
</noscript>
<div id="terminal"></div>
