<!doctype html>
<title>Mauri870's Linux</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    width: 100%;
    height: 100%;
}

#screen_container {
    width: 100vw;
    height: 100vh;
    background: black;
}
</style>

<script src="build/libv86.js"></script>
<script src="build/xterm.js" async=""></script>
<script>
"use strict";

window.onload = function()
{
    var emulator = window.emulator = new V86({
        wasm_path: "build/v86.wasm",
        memory_size: 128 * 1024 * 1024,
        vga_memory_size: 8 * 1024 * 1024,
        screen_container: document.getElementById("screen_container"),
        bios: {
            url: "bios/seabios.bin",
        },
        vga_bios: {
            url: "bios/vgabios.bin",
        },
        bzimage: {
            url: "distro/bzImage",
        },
        initrd: {
            url: "distro/init.cpio",
        },
        cmdline: "mitigations=off init=/sh",
        autostart: true,
    });
}
</script>

<div id="screen_container">
    <div style="white-space: pre; font: 14px monospace; line-height: 18px; color: white;"></div>
    <canvas></canvas>
</div>
